<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Panel de Estudio — Legislación y Ética Profesional</title>
<style>
  :root{
    --navy: #1B3B6F;
    --navy-dark: #12294B;
    --gold: #B8860B;
    --white: #FFFFFF;
    --card: #F3F6FA;
    --card2: #EEF1F6;
    --red: #B03A2E;
    --red-bg: #FBEDEB;
    --violet: #6C3FA8;
    --violet-bg: #F1EBFA;
    --green: #2E7D4F;
    --green-bg: #EAF5EE;
    --gold-bg: #FBF3E3;
    --text: #26313F;
    --subtext: #5A6B7A;
    --line: #DCE3EC;
    --font-head: Cambria, "Times New Roman", serif;
    --font-body: Calibri, "Segoe UI", Arial, sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--white);
    color: var(--text);
    font-family: var(--font-body);
    min-height:100%;
  }

  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }

  /* ================= HEADER ================= */
  .topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding: 22px 16px 12px;
  }
  .icon-badge{
    flex:0 0 auto;
    width:48px; height:48px;
    border-radius:50%;
    background: var(--gold-bg);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    color: var(--gold);
  }
  .heading .eyebrow{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:1.6px;
    color: var(--gold);
    text-transform:uppercase;
    line-height:1.3;
  }
  .heading h1{
    margin:2px 0 0;
    font-family: var(--font-head);
    font-weight:700;
    font-size: 21px;
    color: var(--navy);
    line-height:1.15;
  }

  /* ================= SEARCH ================= */
  .search-wrap{
    padding: 4px 16px 14px;
  }
  .search-box{
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    min-height:46px;
  }
  .search-box svg{ flex:0 0 auto; color: var(--subtext); }
  .search-box input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family: var(--font-body);
    font-size:14.5px;
    color: var(--text);
  }
  .search-box input::placeholder{ color: var(--subtext); }

  /* ================= CATEGORY CHIPS ================= */
  .chips-wrap{
    overflow-x:auto;
    padding: 0 16px 14px;
    -webkit-overflow-scrolling: touch;
  }
  .chips-wrap::-webkit-scrollbar{ display:none; }
  .chips{
    display:flex;
    gap:8px;
    width:max-content;
  }
  .chip{
    flex:0 0 auto;
    padding: 8px 14px;
    border-radius: 20px;
    background: var(--card);
    border:1px solid var(--line);
    font-size: 12.5px;
    font-weight:700;
    color: var(--navy);
    white-space:nowrap;
    cursor:pointer;
    min-height:36px;
    display:flex;
    align-items:center;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .chip .n{
    margin-left:6px;
    font-weight:700;
    color: var(--gold);
    font-size:11px;
  }
  .chip.active{
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }
  .chip.active .n{ color: #E8D9A9; }

  /* ================= STAGE ================= */
  .stage{
    flex:1;
    padding: 4px 16px 8px;
  }

  /* ================= GRID ================= */
  .grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .tool-card{
    display:flex;
    align-items:flex-start;
    gap:14px;
    background: var(--card);
    border-radius: 16px;
    padding: 16px 16px;
    box-shadow: 0 6px 16px rgba(27,59,111,0.08);
    text-decoration:none;
    color:inherit;
    transition: transform .12s ease, box-shadow .12s ease;
    border: 1px solid transparent;
  }
  .tool-card:active{ transform: translateY(1px); }
  .tool-card:hover{
    box-shadow: 0 10px 22px rgba(27,59,111,0.14);
    border-color: var(--line);
  }
  .tool-icon{
    flex:0 0 auto;
    width:44px; height:44px;
    border-radius: 12px;
    background: var(--navy);
    color: var(--white);
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
  }
  .tool-body{ flex:1; min-width:0; }
  .tool-top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:3px;
  }
  .tool-type{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color: var(--gold);
    background: var(--gold-bg);
    border-radius: 20px;
    padding: 3px 9px;
    flex:0 0 auto;
  }
  .tool-title{
    font-family: var(--font-head);
    font-weight:700;
    font-size:16.5px;
    color: var(--navy-dark);
    line-height:1.3;
    margin:0 0 3px;
  }
  .tool-sub{
    font-size:12.5px;
    color: var(--subtext);
    line-height:1.4;
  }
  .tool-arrow{
    flex:0 0 auto;
    color: var(--navy);
    font-size:18px;
    align-self:center;
    opacity:.55;
  }

  /* ================= FICHA AVANZADA (mayor dificultad) ================= */
  .tool-card.hard{
    background: var(--red-bg);
    border-color: rgba(176,58,46,0.35);
    box-shadow: 0 6px 16px rgba(176,58,46,0.12);
  }
  .tool-card.hard:hover{
    box-shadow: 0 10px 22px rgba(176,58,46,0.20);
    border-color: rgba(176,58,46,0.55);
  }
  .tool-card.hard .tool-icon{
    background: var(--red);
  }
  .tool-card.hard .tool-title{
    color: var(--red);
  }
  .tool-level{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color: var(--red);
    background: #fff;
    border: 1px solid rgba(176,58,46,0.35);
    border-radius: 20px;
    padding: 3px 9px;
    flex:0 0 auto;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }

  /* ================= FICHA EXPERTA v3 (máxima complejidad) ================= */
  .tool-card.expert{
    background: var(--violet-bg);
    border-color: rgba(108,63,168,0.38);
    box-shadow: 0 6px 16px rgba(108,63,168,0.14);
  }
  .tool-card.expert:hover{
    box-shadow: 0 10px 22px rgba(108,63,168,0.24);
    border-color: rgba(108,63,168,0.60);
  }
  .tool-card.expert .tool-icon{
    background: linear-gradient(135deg, var(--violet) 0%, #4E2C85 100%);
  }
  .tool-card.expert .tool-title{
    color: var(--violet);
  }
  .tool-card.expert .tool-arrow{
    color: var(--violet);
  }
  .tool-card.expert .tool-level{
    color: var(--violet);
    border-color: rgba(108,63,168,0.38);
  }

  /* ================= CARPETA (agrupa varias fichas) ================= */
  .tool-card.folder{
    background: var(--gold-bg);
    border-color: rgba(184,134,11,0.35);
    box-shadow: 0 6px 16px rgba(184,134,11,0.12);
  }
  .tool-card.folder:hover{
    box-shadow: 0 10px 22px rgba(184,134,11,0.20);
    border-color: rgba(184,134,11,0.55);
  }
  .tool-card.folder .tool-icon{
    background: var(--gold);
  }
  .tool-card.folder .tool-title{
    color: var(--gold);
  }
  .tool-card.folder .tool-arrow{
    color: var(--gold);
    opacity:.8;
  }
  .tool-card.folder .tool-type{
    background: #fff;
    border: 1px solid rgba(184,134,11,0.35);
  }

  /* ================= CUESTIONARIO (quiz del motor) ================= */
  .tool-card.quiz{
    background: var(--green-bg);
    border-color: rgba(46,125,79,0.35);
    box-shadow: 0 6px 16px rgba(46,125,79,0.12);
    border-style: dashed;
  }
  .tool-card.quiz:hover{
    box-shadow: 0 10px 22px rgba(46,125,79,0.20);
    border-color: rgba(46,125,79,0.60);
  }
  .tool-card.quiz .tool-icon{
    background: var(--green);
    border-radius: 50%;
  }
  .tool-card.quiz .tool-title{ color: var(--green); }
  .tool-card.quiz .tool-arrow{ color: var(--green); }
  .tool-card.quiz .tool-type{
    color: var(--green);
    background: #fff;
    border: 1px solid rgba(46,125,79,0.35);
  }

  /* ================= CUESTIONARIO INTENSIVO (más para completar) ================= */
  .tool-card.quiz-plus{
    background: var(--violet-bg);
    border-color: rgba(108,63,168,0.38);
    box-shadow: 0 6px 16px rgba(108,63,168,0.14);
    border-style: dashed;
  }
  .tool-card.quiz-plus:hover{
    box-shadow: 0 10px 22px rgba(108,63,168,0.24);
    border-color: rgba(108,63,168,0.60);
  }
  .tool-card.quiz-plus .tool-icon{
    background: linear-gradient(135deg, var(--violet) 0%, #4E2C85 100%);
    border-radius: 50%;
  }
  .tool-card.quiz-plus .tool-title{ color: var(--violet); }
  .tool-card.quiz-plus .tool-arrow{ color: var(--violet); }
  .tool-card.quiz-plus .tool-type{
    color: var(--violet);
    background: #fff;
    border: 1px solid rgba(108,63,168,0.38);
  }
  .tool-card.quiz-plus .tool-beta{
    color: var(--violet);
    background: var(--violet-bg);
    border-color: rgba(108,63,168,0.45);
  }

  /* Badge "Beta" — marca una ficha nueva / en pruebas */
  .tool-beta{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color: var(--gold);
    background: var(--gold-bg);
    border: 1px solid rgba(184,134,11,0.45);
    border-radius: 20px;
    padding: 3px 9px;
    flex:0 0 auto;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }

  .empty-msg{
    text-align:center;
    color: var(--subtext);
    font-size:13.5px;
    margin-top:30px;
  }

  footer.note{
    text-align:center;
    font-size:10.5px;
    color: var(--subtext);
    padding: 20px 24px 4px;
  }

  /* ================= DESKTOP / TABLET ENHANCEMENT ================= */
  @media (min-width: 640px){
    body{ align-items:center; }
    .topbar, .search-wrap, .chips-wrap, .stage, footer.note{
      width:100%;
      max-width: 640px;
      align-self:center;
      margin: 0 auto;
    }
    .icon-badge{ width:52px; height:52px; font-size:24px; }
    .heading h1{ font-size:25px; }
    .grid{ grid-template-columns: 1fr 1fr; }
  }

  @media (prefers-reduced-motion: reduce){
    .chip, .tool-card{ transition:none !important; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="icon-badge">⚖</div>
    <div class="heading">
      <div class="eyebrow">Legislación y Ética Profesional</div>
      <h1>Panel de Estudio</h1>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar ficha…" autocomplete="off">
    </div>
  </div>

  <div class="chips-wrap">
    <div class="chips" id="chips"></div>
  </div>

  <main class="stage">
    <div class="grid" id="grid"></div>
    <div class="empty-msg" id="emptyMsg" style="display:none;">No se encontraron fichas con ese filtro.</div>
  </main>

  <footer class="note">
    Fichero de Estudio · Legislación y Ética Profesional
  </footer>

<script>
(function(){

  // ============================================================================
  // LISTA DE FICHAS — cargala a mano acá cada vez que agregues un archivo a /src
  // ============================================================================
  //  - file:  nombre exacto del archivo dentro de la carpeta src/
  //  - title: título que se muestra en la tarjeta
  //  - sub:   subtítulo/descripción corta (opcional, podés dejarlo vacío "")
  //  - type:  categoría que se muestra como chip. Usá valores consistentes
  //           (ej: "Fichero", "Quiz", "Mapa Conceptual") para que se agrupen bien
  //  - icon:  un emoji para el ícono de la tarjeta
  //
  //  Para agregar una ficha nueva, copiá un bloque { ... } y completá los datos.
  //  El link final que arma la página es:  src/ + file
  //
  //  Para agregar una CARPETA, apuntá "file" al index de la subcarpeta
  //  (ej: "derecho_administrativo/index.html") y usá tone: "folder".
  // ============================================================================
  const TOOLS = [
    {
      file:  "derecho_administrativo/index.html",
      title: "Derecho Administrativo",
      sub:   "Carpeta · 2 fichas de estudio agrupadas por tema",
      type:  "Carpeta",
      icon:  "📁",
      tone:  "folder"
    },

    {
      file:  "fichero_introduccion.html",
      title: "Introducción",
      sub:   "Ficha de estudio · Conceptos introductorios y marco general",
      type:  "Fichero",
      icon:  "🗂️"
    },

    {
      file:  "quiz/quiz.html?tema=introduccion",
      title: "Cuestionario de Introducción",
      sub:   "54 preguntas · Mismas consignas del fichero, para completar por tema",
      type:  "Cuestionario",
      icon:  "📘",
      tone:  "quiz",
      badge: "Beta"
    },

    {
      file:  "quiz/quiz.html?tema=introduccion_intensivo",
      title: "Introducción · Intensivo",
      sub:   "Mismas preguntas, muchos más espacios para completar en cada respuesta",
      type:  "Cuestionario",
      icon:  "🧩",
      tone:  "quiz-plus",
      badge: "Intensivo",
    },

    {
      file:  "fichero_contratos.html",
      title: "Contratos",
      sub:   "Ficha de estudio · Conceptos generales y apuntes de repaso",
      type:  "Fichero",
      icon:  "🗂️"
    },

    {
      file:  "fichero_cosas.html",
      title: "Cosas",
      sub:   "Ficha de estudio · Conceptos generales y apuntes de repaso",
      type:  "Fichero",
      icon:  "🗂️"
    },

    {
      file:  "fichero_expropiacion.html",   // <-- EDITAR si el nombre cambia al subirlo al repo
      title: "Expropiación",
      sub:   "27 tarjetas · Marco legal, sujetos, indemnización y vías procesales",
      type:  "Fichero",
      icon:  "🗂️"
    },

    {
      file:  "fichero_expropiacion_v2.html",
      title: "Expropiación",
      sub:   "Nivel avanzado · Más texto para completar",
      type:  "Fichero",
      icon:  "🗂️",
      level: "Avanzado"   // <-- marca la ficha como de mayor dificultad
    },

    {
      file:  "fichero_pericias.html",
      title: "Pericias",
      sub:   "Ficha de estudio · Conceptos generales y apuntes de repaso",
      type:  "Fichero",
      icon:  "🗂️"
    },

    {
      file:  "fichero_fideicomiso.html",
      title: "Fideicomiso",
      sub:   "Ficha de estudio · Estructura, partes y funcionamiento",
      type:  "Fichero",
      icon:  "🗂️"
    },

    {
      file:  "fichero_fideicomiso_v2.html",
      title: "Fideicomiso",
      sub:   "Nivel avanzado · Más texto para completar",
      type:  "Fichero",
      icon:  "🗂️",
      level: "Avanzado"   // <-- marca la ficha como de mayor dificultad
    },

    {
      file:  "fichero_fideicomiso_v3.html",
      title: "Fideicomiso",
      sub:   "Nivel experto · La ficha más completa y compleja de todo el panel",
      type:  "Fichero",
      icon:  "🧠",
      level: "Experto",
      tone:  "violet"   // <-- estilo violeta: distingue el v3 del resto (incluidos los v2)
    },

    // --- Ejemplo de cómo agregar la siguiente ficha (descomentar y completar) ---
    // {
    //   file:  "NOMBRE_DEL_ARCHIVO.html",
    //   title: "Título a mostrar",
    //   sub:   "Descripción corta",
    //   type:  "Quiz",
    //   icon:  "❓"
    // },
  ];

  const SRC_FOLDER = 'src'; //SRC FOLDER

  const el = {
    grid: document.getElementById('grid'),
    chips: document.getElementById('chips'),
    emptyMsg: document.getElementById('emptyMsg'),
    searchInput: document.getElementById('searchInput'),
  };

  let currentCat = 'Todas';
  let searchTerm = '';

  function renderChips(){
    const cats = ['Todas', ...Array.from(new Set(TOOLS.map(t=>t.type)))];
    el.chips.innerHTML = '';
    cats.forEach(cat=>{
      const count = cat === 'Todas' ? TOOLS.length : TOOLS.filter(t=>t.type===cat).length;
      const chip = document.createElement('div');
      chip.className = 'chip' + (cat===currentCat ? ' active' : '');
      chip.innerHTML = cat + '<span class="n">' + count + '</span>';
      chip.addEventListener('click', ()=>{
        currentCat = cat;
        renderChips();
        renderGrid();
      });
      el.chips.appendChild(chip);
    });
  }

  function renderGrid(){
    const term = searchTerm.trim().toLowerCase();
    const filtered = TOOLS.filter(t=>{
      const matchCat = currentCat === 'Todas' || t.type === currentCat;
      const matchTerm = !term || t.title.toLowerCase().includes(term) || t.file.toLowerCase().includes(term);
      return matchCat && matchTerm;
    });

    el.grid.innerHTML = '';
    el.emptyMsg.style.display = filtered.length ? 'none' : 'block';

    filtered.forEach(t=>{
      const a = document.createElement('a');
      const toneClass = t.tone === 'violet' ? ' expert'
                      : t.tone === 'folder' ? ' folder'
                      : t.tone === 'quiz' ? ' quiz'
                      : t.tone === 'quiz-plus' ? ' quiz-plus'
                      : t.level ? ' hard' : '';
      a.className = 'tool-card' + toneClass;
      a.href = SRC_FOLDER + '/' + t.file;   // <-- hipervínculo armado a partir de "file"
      const levelIcon = t.tone === 'violet' ? '★ ' : '⚡ ';
      const levelBadge = t.level
        ? '<span class="tool-level">' + levelIcon + t.level + '</span>'
        : '';
      const betaBadge = t.badge
        ? '<span class="tool-beta">🧪 ' + t.badge + '</span>'
        : '';
      a.innerHTML =
        '<div class="tool-icon">' + t.icon + '</div>' +
        '<div class="tool-body">' +
          '<div class="tool-top-row"><span class="tool-type">' + t.type + '</span>' + levelBadge + betaBadge + '</div>' +
          '<div class="tool-title">' + t.title + '</div>' +
          '<div class="tool-sub">' + (t.sub || t.file) + '</div>' +
        '</div>' +
        '<div class="tool-arrow">→</div>';
      el.grid.appendChild(a);
    });
  }

  el.searchInput.addEventListener('input', (e)=>{
    searchTerm = e.target.value;
    renderGrid();
  });

  renderChips();
  renderGrid();

})();
</script>

</body>
</html>
