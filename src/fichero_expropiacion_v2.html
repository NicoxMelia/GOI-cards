<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fichero de Expropiación — Pregunta y Completar</title>
<style>
  :root{
    --navy: #1B3B6F;
    --navy-dark: #12294B;
    --gold: #B8860B;
    --white: #FFFFFF;
    --card: #F3F6FA;
    --card2: #EEF1F6;
    --red: #B03A2E;
    --red-bg: #FBEDEB;
    --green: #2E7D4F;
    --green-bg: #EAF5EE;
    --gold-bg: #FBF3E3;
    --text: #26313F;
    --subtext: #5A6B7A;
    --line: #DCE3EC;
    --font-head: Cambria, "Times New Roman", serif;
    --font-body: Calibri, "Segoe UI", Arial, sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--white);
    color: var(--text);
    font-family: var(--font-body);
    height:100%;
  }

  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding-bottom: calc(84px + env(safe-area-inset-bottom));
  }

  /* ================= HEADER ================= */
  .topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding: 18px 16px 10px;
  }
  .icon-badge{
    flex:0 0 auto;
    width:44px; height:44px;
    border-radius:50%;
    background: var(--gold-bg);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
    color: var(--gold);
  }
  .heading .eyebrow{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:1.6px;
    color: var(--gold);
    text-transform:uppercase;
    line-height:1.3;
  }
  .heading h1{
    margin:2px 0 0;
    font-family: var(--font-head);
    font-weight:700;
    font-size: 20px;
    color: var(--navy);
    line-height:1.15;
  }

  /* ================= CATEGORY CHIPS ================= */
  .chips-wrap{
    overflow-x:auto;
    padding: 4px 16px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .chips-wrap::-webkit-scrollbar{ display:none; }
  .chips{
    display:flex;
    gap:8px;
    width:max-content;
  }
  .chip{
    flex:0 0 auto;
    padding: 8px 14px;
    border-radius: 20px;
    background: var(--card);
    border:1px solid var(--line);
    font-size: 12.5px;
    font-weight:700;
    color: var(--navy);
    white-space:nowrap;
    cursor:pointer;
    min-height:36px;
    display:flex;
    align-items:center;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .chip .n{
    margin-left:6px;
    font-weight:700;
    color: var(--gold);
    font-size:11px;
  }
  .chip.active{
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }
  .chip.active .n{ color: #E8D9A9; }

  /* ================= STAGE ================= */
  .stage{
    flex:1;
    padding: 4px 16px 8px;
    display:flex;
    flex-direction:column;
  }

  .stage-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .tag{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color: var(--gold);
    background: var(--gold-bg);
    border-radius: 20px;
    padding: 5px 12px;
  }
  .counter{
    font-size:12.5px;
    font-weight:700;
    color: var(--subtext);
    font-variant-numeric: tabular-nums;
  }

  .card-scene{
    perspective: 1500px;
    min-height: 400px;
    flex:1;
  }
  .card{
    position:relative;
    width:100%; height:100%;
    min-height:400px;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.2,.7,.3,1);
  }
  .card.flipped{ transform: rotateY(180deg); }

  .face{
    position:absolute; inset:0;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
    border-radius: 16px;
    background: var(--card);
    padding: 20px 18px 18px;
    display:flex;
    flex-direction:column;
    box-shadow: 0 10px 24px rgba(27,59,111,0.14);
    overflow-y:auto;
  }
  .face.back{
    transform: rotateY(180deg);
    background: var(--white);
    border:1px solid var(--line);
    cursor:auto;
  }
  .face.front{ cursor:pointer; }

  .face .face-top{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom: 12px;
    flex: 0 0 auto;
  }
  .face-dot{
    width:28px; height:28px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    font-weight:700;
    color: var(--white);
    background: var(--navy);
    flex:0 0 auto;
  }
  .face.back .face-dot{ background: var(--gold); }
  .face .face-label{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:1.8px;
    color: var(--navy);
    text-transform:uppercase;
  }
  .face.back .face-label{ color: var(--gold); }

  .question-text{
    font-family: var(--font-head);
    font-size: 19px;
    line-height:1.45;
    color: var(--navy-dark);
    flex:1;
  }
  .front .hint{
    margin-top:auto;
    padding-top:10px;
    font-size:11px;
    font-style:italic;
    color: var(--subtext);
    flex: 0 0 auto;
  }

  .fill-text{
    font-family: var(--font-head);
    font-size: 15px;
    line-height:2.3;
    color: var(--navy-dark);
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap: 0 2px;
    margin:0;
  }
  .fill-text .txt{ white-space:pre-wrap; }

  .blank-input{
    font-family: var(--font-body);
    font-size: 13px;
    font-weight:700;
    color: var(--navy);
    border: none;
    border-bottom: 2px solid var(--gold);
    background: var(--gold-bg);
    border-radius: 6px 6px 2px 2px;
    padding: 4px 8px;
    margin: 3px 2px;
    min-width: 140px;
    max-width: 100%;
    text-align:left;
    outline:none;
    transition: border-color .15s ease, background .15s ease;
  }
  .blank-input:focus{
    background: #FDF1D8;
    border-color: var(--navy);
  }
  .blank-input.correct{
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green);
  }
  .blank-input.incorrect{
    background: var(--red-bg);
    border-color: var(--red);
    color: var(--red);
  }

  .result-line{
    min-height: 20px;
    margin-top:10px;
    font-size:12.5px;
    font-weight:700;
    text-align:center;
    flex: 0 0 auto;
  }
  .result-line.ok{ color: var(--green); }
  .result-line.bad{ color: var(--red); }
  .result-line.info{ color: var(--navy); }

  .back-action-row{
    display:flex;
    flex-wrap: wrap;
    gap:8px;
    margin-top:10px;
    flex: 0 0 auto;
  }
  .btn{
    flex: 1 1 100px;
    min-height:42px;
    border-radius: 12px;
    font-family: var(--font-body);
    font-weight:700;
    font-size:12.8px;
    border:1px solid transparent;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    text-align:center;
    padding: 0 8px;
    transition: transform .1s ease, background .15s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

  .btn-validate{ background: var(--navy); color: var(--white); flex-basis:100%; order:3; }
  .btn-validate:active{ background: var(--navy-dark); }
  .btn-retry{ background: var(--card2); color: var(--navy); border-color: var(--line); }
  .btn-autofill{ background: var(--gold-bg); color: var(--gold); border-color: rgba(184,134,11,0.4); }

  /* ================= PROGRESS ================= */
  .progress-wrap{ margin-top:14px; }
  .progress-label{
    font-size:11.5px;
    color: var(--subtext);
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
  }
  .progress-bar{
    height:8px;
    border-radius:6px;
    background: var(--card2);
    overflow:hidden;
    display:flex;
  }
  .seg-know{ background: var(--green); height:100%; }
  .seg-review{ background: var(--red); height:100%; }

  /* ================= UTILITY ROW ================= */
  .utility-row{
    display:flex;
    justify-content:center;
    gap: 18px;
    padding: 10px 16px 4px;
    flex-wrap:wrap;
  }
  .util-btn{
    background:none;
    border:none;
    font-family: var(--font-body);
    font-size:12.5px;
    font-weight:700;
    color: var(--subtext);
    cursor:pointer;
    padding:6px 4px;
    min-height:36px;
  }
  .util-btn:hover{ color: var(--navy); }

  footer.note{
    text-align:center;
    font-size:10.5px;
    color: var(--subtext);
    padding: 6px 24px 4px;
  }

  /* ================= BOTTOM NAV (fixed, mobile) ================= */
  .bottom-nav{
    position:fixed;
    left:0; right:0; bottom:0;
    background: var(--white);
    border-top: 1px solid var(--line);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow: 0 -6px 18px rgba(27,59,111,0.08);
  }
  .nav-btn{
    min-height:48px;
    border-radius: 12px;
    border:1px solid var(--line);
    background: var(--card);
    color: var(--navy);
    font-size:20px;
    font-weight:700;
    display:flex; align-items:center; justify-content:center;
    width:52px;
    flex:0 0 auto;
    cursor:pointer;
  }
  .nav-btn-main{
    flex:1;
    width:auto;
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    font-size:14.5px;
    letter-spacing:0.3px;
  }
  .nav-btn-main:active{ background: var(--navy-dark); }
  .nav-btn:active{ background: var(--card2); }

  /* ================= DESKTOP / TABLET ENHANCEMENT ================= */
  @media (min-width: 640px){
    body{ align-items:center; }
    .topbar, .chips-wrap, .stage, .utility-row, footer.note{
      width:100%;
      max-width: 600px;
      align-self:center;
      margin: 0 auto;
    }
    .icon-badge{ width:52px; height:52px; font-size:24px; }
    .heading h1{ font-size:25px; }
    .card-scene{ min-height: 440px; }
    .card{ min-height:440px; }
    .question-text{ font-size:22px; }
    .fill-text{ font-size:17px; }
    .blank-input{ min-width:180px; }
    .bottom-nav{
      max-width: 600px;
      left:50%;
      transform: translateX(-50%);
      border-radius: 16px 16px 0 0;
    }
  }

  @media (prefers-reduced-motion: reduce){
    .card, .chip{ transition:none !important; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="icon-badge">⚖</div>
    <div class="heading">
      <div class="eyebrow">Legislación y Ética Profesional</div>
      <h1>Fichero de Expropiación</h1>
    </div>
  </header>

  <div class="chips-wrap">
    <div class="chips" id="chips"></div>
  </div>

  <main class="stage">
    <div class="stage-meta">
      <span class="tag" id="tag">—</span>
      <span class="counter" id="counter">0 / 0</span>
    </div>

    <div class="card-scene">
      <div class="card" id="card">
        <div class="face front" id="frontFace">
          <div class="face-top">
            <div class="face-dot">P</div>
            <div class="face-label">Pregunta</div>
          </div>
          <div class="question-text" id="questionText">Cargando…</div>
          <div class="hint">Tocá la tarjeta (o "Completar") para escribir la respuesta con tus palabras</div>
        </div>
        <div class="face back">
          <div class="face-top">
            <div class="face-dot">✎</div>
            <div class="face-label">Completar</div>
          </div>
          <p class="fill-text" id="fillText"></p>
          <div class="result-line" id="resultLine"></div>
          <div class="back-action-row">
            <button class="btn btn-retry" id="retryBtn">↺ Reintentar</button>
            <button class="btn btn-autofill" id="autofillBtn">✨ Completar automático</button>
            <button class="btn btn-validate" id="validateBtn">Validar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel">0 correctas · 0 con errores · 0 sin intentar</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="seg-know" id="segKnow" style="width:0%"></div>
        <div class="seg-review" id="segReview" style="width:0%"></div>
      </div>
    </div>
  </main>

  <div class="utility-row">
    <button class="util-btn" id="shuffleBtn">🔀 Barajar</button>
    <button class="util-btn" id="orderBtn">🔢 Orden original</button>
    <button class="util-btn" id="resetBtn">↺ Reiniciar todo</button>
  </div>

  <footer class="note">
    El progreso se guarda solo durante esta sesión.
  </footer>

  <nav class="bottom-nav">
    <button class="nav-btn" id="prevBtn" aria-label="Anterior">‹</button>
    <button class="nav-btn nav-btn-main" id="flipBtn">Completar →</button>
    <button class="nav-btn" id="nextBtn" aria-label="Siguiente">›</button>
  </nav>

<script>
(function(){

  // "t" usa {{frase de la respuesta}} — cada espacio representa una frase completa a escribir.
  // Alternativas válidas se separan con "||" dentro de las llaves.
  const RAW = [
    { cat:"Marco Legal",
      q:"¿Qué establece el Art. 17 de la Constitución Nacional sobre la propiedad?",
      t:"La propiedad es {{inviolable, y ningún habitante de la Nación puede ser privado de ella}}, sino en virtud de {{sentencia fundada en ley}}." },
    { cat:"Marco Legal",
      q:"Según el Art. 2.511 del CCyC, ¿por qué causa puede privarse a alguien de su propiedad?",
      t:"Nadie puede ser privado de su propiedad sino por {{causa de utilidad pública, previa la desposesión y una justa indemnización}}." },
    { cat:"Marco Legal",
      q:"Definí la expropiación.",
      t:"La expropiación es {{la ocupación de cosas de propiedad individual con fines de utilidad pública}}, mediante {{la indemnización de su valor y de los perjuicios derivados directamente de ella}}." },

    { cat:"Sujetos y Etapas",
      q:"¿Quiénes pueden actuar como sujeto expropiante?",
      t:"El expropiante puede ser {{el Estado Nacional, Provincial o Municipal}}, {{entidades autárquicas o empresas del Estado}}, o {{particulares o personas jurídicas autorizados por ley}}." },
    { cat:"Sujetos y Etapas",
      q:"¿Quién es el sujeto expropiado?",
      t:"El sujeto expropiado son {{los particulares}}, aunque el Estado Nacional puede expropiar también {{bienes del dominio provincial o municipal}}." },
    { cat:"Sujetos y Etapas",
      q:"¿Cuáles son los tres requisitos que exige toda expropiación?",
      t:"Toda expropiación requiere {{utilidad pública, que esté calificada por ley}}, y {{el pago de una indemnización}}." },

    { cat:"Indemnización",
      q:"¿Qué significa que la indemnización sea “previa”?",
      t:"La indemnización previa debe efectuarse {{al propietario antes de la ocupación por parte del expropiante}}." },
    { cat:"Indemnización",
      q:"¿Qué implica que la indemnización sea “justa”?",
      t:"La indemnización justa comprende {{el pago real de la cosa más el perjuicio directo derivado de la privación}}." },
    { cat:"Indemnización",
      q:"¿En qué consiste que la indemnización se pague “en dinero”?",
      t:"La indemnización en dinero es {{una compraventa de carácter obligatorio o forzoso}}, cuya contraprestación {{se paga en dinero}}." },
    { cat:"Indemnización",
      q:"Nombrá los conceptos que NO se toman en cuenta al fijar la indemnización.",
      t:"No se toman en cuenta {{las circunstancias de carácter personal, los valores afectivos, las ganancias hipotéticas ni el lucro cesante}}." },
    { cat:"Indemnización",
      q:"¿Qué valores SÍ se toman en cuenta para fijar la indemnización?",
      t:"Sí se toman en cuenta {{el valor panorámico y el valor histórico del bien}}." },

    { cat:"Vías",
      q:"Describí la expropiación por avenimiento.",
      t:"En la expropiación por avenimiento, {{las partes discuten y acuerdan el precio}}, y {{al valor establecido se le agrega un 10% más}}." },
    { cat:"Vías",
      q:"Describí la expropiación judicial.",
      t:"La expropiación judicial {{tramita por juicio sumario, con intervención del Tribunal de Tasaciones de la Nación}}, y {{culmina con sentencia judicial, previa consignación del importe de la valuación}}." },

    { cat:"Bienes y Tribunal",
      q:"Mencioná al menos cinco tipos de bienes expropiables.",
      t:"Son bienes expropiables {{las universalidades, los lugares históricos, el espacio aéreo, el subsuelo y las iglesias, entre otros}}." },
    { cat:"Bienes y Tribunal",
      q:"¿Por qué el dinero extranjero es expropiable pero no el nacional?",
      t:"El dinero extranjero es expropiable, {{pero no el nacional, ya que la indemnización se paga en dinero}}." },
    { cat:"Bienes y Tribunal",
      q:"¿Qué necesita el Estado Federal para expropiar bienes de dominio privado provincial?",
      t:"El Estado Federal necesita {{el consentimiento de la provincia en cuestión}}." },
    { cat:"Bienes y Tribunal",
      q:"¿Pueden las provincias expropiar bienes del Estado federal?",
      t:"Las provincias pueden {{excepcionalmente expropiar bienes de dominio privado del Estado federal}}; para los de dominio público, {{hace falta el consentimiento del Estado Federal}}." },
    { cat:"Bienes y Tribunal",
      q:"¿Cuál es la función del Tribunal de Tasaciones?",
      t:"El Tribunal de Tasaciones {{tasa los bienes muebles e inmuebles sujetos a expropiación y dictamina acerca de su valor}}." },

    { cat:"Formas Especiales",
      q:"¿Qué es la expropiación diferida?",
      t:"En la expropiación diferida, el expropiante {{desapodera a los propietarios en forma escalonada, por razones financieras}}." },
    { cat:"Formas Especiales",
      q:"Mencioná los tres casos en que procede la expropiación irregular.",
      t:"Procede la expropiación irregular cuando {{el Estado toma el bien sin pagar la indemnización}}, cuando {{el bien resulta indisponible por evidente dificultad para disponer de él}}, o cuando {{se impone una restricción indebida al derecho de propiedad}}." },
    { cat:"Formas Especiales",
      q:"¿Por qué se dice que esta acción es “irregular”?",
      t:"La acción es irregular porque {{la ejerce el expropiado y no el expropiante}}." },
    { cat:"Formas Especiales",
      q:"¿Cuándo procede la retrocesión?",
      t:"La retrocesión procede cuando {{al bien se le da un destino distinto al previsto en la ley}}, o cuando {{no se le da destino alguno dentro de los dos años desde que la expropiación quedó perfeccionada}}." },
    { cat:"Formas Especiales",
      q:"¿Cuáles son los dos casos de retrocesión?",
      t:"Los dos casos de retrocesión son {{la retrocesión por falta de destino y la retrocesión por destino distinto}}." },
    { cat:"Formas Especiales",
      q:"¿Qué es la ocupación temporaria?",
      t:"La ocupación temporaria es {{el uso transitorio de un bien o cosa determinados, por razones de utilidad pública}}." },
    { cat:"Formas Especiales",
      q:"Características de la Ocupación Temporaria ANORMAL.",
      t:"La OT anormal {{es declarada por la autoridad administrativa y no da lugar a indemnización alguna, salvo la reparación de daños}}." },
    { cat:"Formas Especiales",
      q:"Características de la Ocupación Temporaria NORMAL.",
      t:"La OT normal {{apareja indemnización, no puede dársele un destino distinto al previsto en la ley, y su plazo es menor a 2 años}}." },

    { cat:"Esquema General",
      q:"En el esquema general, ¿qué ocurre en la Intervención Legislativa?",
      t:"En la intervención legislativa, {{el Congreso o la Legislatura sanciona una ley que declara de utilidad pública y sujeto a expropiación un bien}}." },
    { cat:"Esquema General",
      q:"¿Qué ocurre en la Intervención Administrativa?",
      t:"En la intervención administrativa, {{el expropiante podrá adquirir el bien directamente del expropiado, ofreciendo los valores mínimos fijados por el Tribunal de Tasaciones}}." },
    { cat:"Esquema General",
      q:"¿Qué sucede en el Avenimiento Expropiatorio?",
      t:"En el avenimiento expropiatorio, {{el propietario acepta el ofrecimiento del expropiante}}, y {{la indemnización se incrementa un 10%, como incentivo para evitar la intervención judicial}}." },
    { cat:"Esquema General",
      q:"¿Qué ocurre en la Intervención Judicial?",
      t:"En la intervención judicial, {{si no hay avenimiento, el expropiante debe promover la acción judicial}}, y {{la expropiación queda perfeccionada con la transferencia de dominio, toma de posesión y pago}}." },
  ];

  function parseTemplate(t){
    const parts = t.split(/\{\{(.*?)\}\}/g);
    const segments = [];
    const blanks = [];
    for(let i=0;i<parts.length;i++){
      if(i % 2 === 0){
        segments.push(parts[i]);
      } else {
        blanks.push(parts[i].split('||').map(s=>s.trim()));
      }
    }
    return { segments, blanks };
  }

  const DATA = RAW.map((d,i)=>{
    const parsed = parseTemplate(d.t);
    return { id:i, cat:d.cat, q:d.q, segments:parsed.segments, blanks:parsed.blanks };
  });

  const CATS = ["Todas", ...Array.from(new Set(DATA.map(d=>d.cat)))];

  const status = {};      // id -> 'correct' | 'incorrect'
  const attempts = {};    // id -> array of input strings
  const autofillState = {}; // id -> { active:boolean, snapshot: [...] }

  let currentCat = "Todas";
  let order = DATA.map(d=>d.id);
  let pos = 0;
  let flipped = false;

  const el = {
    chips: document.getElementById('chips'),
    card: document.getElementById('card'),
    frontFace: document.getElementById('frontFace'),
    questionText: document.getElementById('questionText'),
    fillText: document.getElementById('fillText'),
    tag: document.getElementById('tag'),
    counter: document.getElementById('counter'),
    resultLine: document.getElementById('resultLine'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    flipBtn: document.getElementById('flipBtn'),
    validateBtn: document.getElementById('validateBtn'),
    retryBtn: document.getElementById('retryBtn'),
    autofillBtn: document.getElementById('autofillBtn'),
    shuffleBtn: document.getElementById('shuffleBtn'),
    orderBtn: document.getElementById('orderBtn'),
    resetBtn: document.getElementById('resetBtn'),
    progressLabel: document.getElementById('progressLabel'),
    progressPercent: document.getElementById('progressPercent'),
    segKnow: document.getElementById('segKnow'),
    segReview: document.getElementById('segReview'),
  };

  function normalize(s){
    return (s || "").toString().trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^\w\s%]/g,'')
      .replace(/\s+/g,' ');
  }

  function currentIds(){
    if(currentCat === "Todas") return order;
    return order.filter(id => DATA[id].cat === currentCat);
  }

  function renderChips(){
    el.chips.innerHTML = "";
    CATS.forEach(cat=>{
      const count = cat === "Todas" ? DATA.length : DATA.filter(d=>d.cat===cat).length;
      const chip = document.createElement('div');
      chip.className = 'chip' + (cat===currentCat ? ' active' : '');
      chip.innerHTML = cat + '<span class="n">' + count + '</span>';
      chip.addEventListener('click', ()=>{
        currentCat = cat;
        pos = 0;
        flipped = false;
        renderChips();
        renderCard();
      });
      el.chips.appendChild(chip);
    });
  }

  function currentInputs(){
    return Array.from(el.fillText.querySelectorAll('.blank-input'));
  }

  function buildFillText(d){
    el.fillText.innerHTML = "";
    const saved = attempts[d.id] || [];
    d.segments.forEach((seg, i)=>{
      if(seg.length){
        const span = document.createElement('span');
        span.className = 'txt';
        span.textContent = seg;
        el.fillText.appendChild(span);
      }
      if(i < d.blanks.length){
        const input = document.createElement('textarea');
        input.rows = 1;
        input.className = 'blank-input';
        input.setAttribute('autocomplete','off');
        input.setAttribute('autocapitalize','off');
        input.spellcheck = false;
        input.dataset.index = i;
        input.value = saved[i] || '';
        autoSize(input);
        input.addEventListener('click', (e)=> e.stopPropagation());
        input.addEventListener('input', ()=>{
          input.classList.remove('correct','incorrect');
          autoSize(input);
          attempts[d.id] = attempts[d.id] || [];
          attempts[d.id][i] = input.value;
          if(autofillState[d.id]) autofillState[d.id].active = false;
          el.autofillBtn.textContent = '✨ Completar automático';
        });
        input.addEventListener('keydown', (e)=>{
          if(e.key === 'Enter' && !e.shiftKey){
            e.preventDefault();
            const inputs = currentInputs();
            const idx = inputs.indexOf(input);
            if(idx < inputs.length - 1){
              inputs[idx+1].focus();
            } else {
              validate();
            }
          }
        });
        el.fillText.appendChild(input);
      }
    });
  }

  function autoSize(textarea){
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
  }

  function renderCard(){
    const ids = currentIds();
    if(ids.length === 0){
      el.tag.textContent = "—";
      el.counter.textContent = "0 / 0";
      el.questionText.textContent = "No hay tarjetas en esta categoría.";
      el.fillText.textContent = "";
      el.resultLine.textContent = "";
      updateProgress();
      return;
    }
    if(pos >= ids.length) pos = 0;
    if(pos < 0) pos = ids.length - 1;

    const id = ids[pos];
    const d = DATA[id];

    el.card.classList.toggle('flipped', flipped);
    el.flipBtn.textContent = flipped ? '← Pregunta' : 'Completar →';
    el.tag.textContent = d.cat;
    el.counter.textContent = (pos+1) + " / " + ids.length;
    el.questionText.textContent = d.q;

    buildFillText(d);

    const afState = autofillState[id];
    el.autofillBtn.textContent = (afState && afState.active) ? '↺ Deshacer autocompletar' : '✨ Completar automático';

    el.resultLine.textContent = "";
    el.resultLine.className = "result-line";

    if(afState && afState.active){
      showResult(d.blanks.length, d.blanks.length, 'info', 'Respuestas completadas automáticamente');
    } else if(status[id]){
      revalidateColorsOnly(d);
    }

    updateProgress();
  }

  function revalidateColorsOnly(d){
    const inputs = currentInputs();
    let correctCount = 0;
    inputs.forEach((input, i)=>{
      const val = normalize(input.value);
      const ok = d.blanks[i].some(ans => normalize(ans) === val);
      input.classList.toggle('correct', ok);
      input.classList.toggle('incorrect', !ok);
      if(ok) correctCount++;
    });
    showResult(correctCount, d.blanks.length);
  }

  function showResult(correct, total, forceClass, forceText){
    if(forceText){
      el.resultLine.textContent = forceText;
      el.resultLine.className = "result-line " + (forceClass || "");
      return;
    }
    el.resultLine.textContent = correct + " de " + total + " correctas";
    el.resultLine.className = "result-line " + (correct === total ? "ok" : "bad");
  }

  function validate(){
    const ids = currentIds();
    if(ids.length === 0) return;
    const id = ids[pos];
    const d = DATA[id];
    const inputs = currentInputs();
    let correctCount = 0;
    inputs.forEach((input, i)=>{
      const val = normalize(input.value);
      const ok = d.blanks[i].some(ans => normalize(ans) === val);
      input.classList.toggle('correct', ok);
      input.classList.toggle('incorrect', !ok);
      if(ok) correctCount++;
    });
    status[id] = (correctCount === d.blanks.length) ? 'correct' : 'incorrect';
    showResult(correctCount, d.blanks.length);
    updateProgress();
  }

  function retry(){
    const ids = currentIds();
    if(ids.length === 0) return;
    const id = ids[pos];
    delete attempts[id];
    delete status[id];
    delete autofillState[id];
    renderCard();
    const firstInput = el.fillText.querySelector('.blank-input');
    if(firstInput) firstInput.focus();
  }

  function toggleAutofill(){
    const ids = currentIds();
    if(ids.length === 0) return;
    const id = ids[pos];
    const d = DATA[id];
    const inputs = currentInputs();
    const state = autofillState[id] || { active:false, snapshot:null };

    if(!state.active){
      // Guardamos lo que había antes de autocompletar, para poder volver
      state.snapshot = inputs.map(inp => inp.value);
      inputs.forEach((inp, i)=>{
        inp.value = d.blanks[i][0];
        autoSize(inp);
        inp.classList.remove('incorrect');
        inp.classList.add('correct');
      });
      attempts[id] = inputs.map(inp => inp.value);
      state.active = true;
      el.autofillBtn.textContent = '↺ Deshacer autocompletar';
      showResult(d.blanks.length, d.blanks.length, 'info', 'Respuestas completadas automáticamente');
    } else {
      inputs.forEach((inp, i)=>{
        inp.value = (state.snapshot && state.snapshot[i]) || '';
        autoSize(inp);
        inp.classList.remove('correct','incorrect');
      });
      attempts[id] = inputs.map(inp => inp.value);
      state.active = false;
      el.autofillBtn.textContent = '✨ Completar automático';
      if(status[id]){
        revalidateColorsOnly(d);
      } else {
        el.resultLine.textContent = "";
        el.resultLine.className = "result-line";
      }
    }
    autofillState[id] = state;
  }

  function updateProgress(){
    const total = DATA.length;
    const correct = DATA.filter(d=>status[d.id]==='correct').length;
    const incorrect = DATA.filter(d=>status[d.id]==='incorrect').length;
    const none = total - correct - incorrect;
    el.progressLabel.textContent = correct + " correctas · " + incorrect + " con errores · " + none + " sin intentar";
    const pct = total ? Math.round((correct/total)*100) : 0;
    el.progressPercent.textContent = pct + "%";
    el.segKnow.style.width = (total ? (correct/total*100) : 0) + "%";
    el.segReview.style.width = (total ? (incorrect/total*100) : 0) + "%";
  }

  function flip(){
    flipped = !flipped;
    el.card.classList.toggle('flipped', flipped);
    el.flipBtn.textContent = flipped ? '← Pregunta' : 'Completar →';
    if(flipped){
      setTimeout(()=>{
        const firstInput = el.fillText.querySelector('.blank-input');
        if(firstInput) firstInput.focus({preventScroll:true});
      }, 260);
    }
  }

  function go(delta){
    const ids = currentIds();
    if(ids.length === 0) return;
    pos = (pos + delta + ids.length) % ids.length;
    flipped = false;
    renderCard();
  }

  function shuffleArray(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  el.frontFace.addEventListener('click', ()=>{ if(!flipped) flip(); });
  el.flipBtn.addEventListener('click', flip);
  el.prevBtn.addEventListener('click', ()=>go(-1));
  el.nextBtn.addEventListener('click', ()=>go(1));
  el.validateBtn.addEventListener('click', validate);
  el.retryBtn.addEventListener('click', retry);
  el.autofillBtn.addEventListener('click', toggleAutofill);

  el.shuffleBtn.addEventListener('click', ()=>{
    order = shuffleArray(DATA.map(d=>d.id));
    pos = 0; flipped = false;
    renderCard();
  });
  el.orderBtn.addEventListener('click', ()=>{
    order = DATA.map(d=>d.id);
    pos = 0; flipped = false;
    renderCard();
  });
  el.resetBtn.addEventListener('click', ()=>{
    Object.keys(status).forEach(k=>delete status[k]);
    Object.keys(attempts).forEach(k=>delete attempts[k]);
    Object.keys(autofillState).forEach(k=>delete autofillState[k]);
    renderCard();
  });

  document.addEventListener('keydown', (e)=>{
    const isTyping = document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('blank-input');
    if(isTyping) return;
    if(e.key === 'ArrowRight'){ go(1); }
    else if(e.key === 'ArrowLeft'){ go(-1); }
    else if(e.key === ' '){ e.preventDefault(); flip(); }
  });

  renderChips();
  renderCard();

})();
</script>

</body>
</html>
